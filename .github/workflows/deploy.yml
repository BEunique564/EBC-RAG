# EBC Legal AI — GitHub Actions Deploy Pipeline
# Har push pe tests chalega, phir AWS pe deploy
name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger bhi kar sakte ho

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: node tests/adversarial.test.js
      - run: node tests/confidence-calibration.test.js

  deploy:
    name: Build & Deploy to AWS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ebc-ai-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster ebc-ai-production \
            --service ebc-ai-api \
            --force-new-deployment \
            --region ap-south-1

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ebc-ai-production \
            --services ebc-ai-api \
            --region ap-south-1

      - name: Smoke test
        run: |
          sleep 30
          curl -f https://ai.ebc.co.in/api/health || echo "Health check failed (might need more time)"
