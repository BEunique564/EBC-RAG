services:
  legal-rag:
    build: .
    ports:
      - "5174:5174"
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - PORT=5174
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    profiles: ["production-shape"]
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: legal_rag
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["production-shape"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  redis-data:
  postgres-data:
  qdrant-data:
